<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CoffeeArt - Histórias do Café</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    body, html { 
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #fff4e6; overflow-x: hidden;
      font-family: 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    header { 
      width: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px 0 10px 0;
    }
    .card-titulo {
      width: 90%; max-width: 600px; background-color: #4a332d; color: #d4a373;
      padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center;
    }
    .card-titulo span { font-size: 18px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
    
    .arrasta-indicador {
      text-align: center; color: #4a332d; font-size: 13px; font-weight: bold; margin: 10px 0;
      letter-spacing: 1px; animation: bounce 2s infinite; opacity: 0.8;
    }
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {transform: translateX(0);}
      40% {transform: translateX(5px);}
      60% {transform: translateX(3px);}
    }

    /* CARROSSEL GRANDE */
    .swiper { width: 100%; height: 500px; margin-top: 5px; }
    .swiper-slide { display: flex; justify-content: center; align-items: center; width: auto; }
    
    .card { 
      border-radius: 20px; overflow: hidden; background: #ffffff; border: 1px solid #efe4d8; 
      display: block; position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 320px; height: 450px;
    }
    .card img { height: 100%; width: 100%; object-fit: cover; display: block; }

    /* BLOCO DO BOTÃO CURTIR + CONTADOR SOMA */
    .container-curtir {
      position: absolute; top: 15px; right: 15px;
      background: rgba(255, 255, 255, 0.95);
      padding: 6px 12px; border-radius: 20px;
      display: flex; align-items: center; gap: 6px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15); z-index: 12;
    }
    .btn-curtir {
      background: none; border: none; padding: 0;
      font-size: 18px; color: #888; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s ease;
    }
    .btn-curtir.curtido { color: #e63946; }
    .btn-curtir:active { transform: scale(0.8); }
    
    .contador-numero {
      font-size: 13px; font-weight: bold; color: #4a332d;
      font-family: sans-serif; min-width: 10px;
    }

    /* BOTÃO INTERNO SAIBA MAIS */
    .btn-saiba-mais { 
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #4a332d; color: #ffffff; padding: 12px 24px; border-radius: 30px; 
      font-size: 14px; font-weight: bold; z-index: 10; border: 2px solid #d4a373;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-transform: uppercase; cursor: pointer;
      white-space: nowrap; transition: 0.2s;
    }
    .btn-saiba-mais:active { transform: translateX(-50%) scale(0.95); }

    /* POP-UP (MODAL) */
    .modal {
      display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100vw; height: 100vh;
      background-color: rgba(0,0,0,0.75); align-items: center; justify-content: center; padding: 20px; box-sizing: border-box;
    }
    .modal-content {
      background-color: white; border-radius: 24px; width: 90%; max-width: 380px; max-height: 82vh; 
      display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 12px 35px rgba(0,0,0,0.6); 
      animation: abrirModal 0.25s ease-out; position: relative; margin: auto; 
    }
    @keyframes abrirModal { from { transform: scale(0.93); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    
    .modal-fechar { 
      position: absolute; top: 12px; right: 12px; background: rgba(74, 51, 45, 0.9); 
      color: white; border: none; width: 36px; height: 36px; border-radius: 50%; 
      font-size: 22px; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; 
    }
    
    .modal-img-container { width: 100%; height: 180px; min-height: 180px; position: relative; }
    .modal-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    
    .modal-corpo { padding: 20px; background: white; overflow-y: auto; flex-grow: 1; -webkit-overflow-scrolling: touch; }
    .modal-titulo { font-size: 18px; font-weight: bold; color: #4a332d; text-transform: uppercase; margin: 0 0 12px 0; border-bottom: 2px solid #efe4d8; padding-bottom: 6px; }
    .modal-texto { font-size: 14.5px; color: #444; line-height: 1.6; margin: 0; text-align: justify; white-space: pre-line; }
    
    @media (max-width: 600px) {
      .swiper { height: 460px; }
      .card { width: 280px; height: 410px; }
      .modal-content { width: 88%; max-height: 78vh; }
      .modal-img-container { height: 160px; min-height: 160px; }
      .modal-corpo { padding: 16px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="card-titulo">
        <span>📖 Experiência CoffeeArt</span>
    </div>
  </header>

  <div class="arrasta-indicador">CONHEÇA NOSSOS GRÃOS ➔</div>

  <div class="swiper">
    <div class="swiper-wrapper" id="track"></div>
  </div>

  <div id="modalHistoria" class="modal" onclick="fecharModalExterno(event)">
    <div class="modal-content">
        <button class="modal-fechar" onclick="fecharModal()">×</button>
        <div class="modal-img-container">
            <img id="modalImg" src="" class="modal-img">
        </div>
        <div class="modal-corpo">
            <h3 class="modal-titulo">☕ Nossa História</h3>
            <p id="modalTexto" class="modal-texto"></p>
        </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    const CSV_HISTORIAS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQopJa1EmJJ43rz6gcZem_2vSA7A3p9sottt3BpNCd4pexNqyNrdKQoO7RCCL2qkLjvhsG5qPVJqkHU/pub?output=csv';
    
    // LINK DO SEU GOOGLE APPS SCRIPT
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwKg4sGAjdgi71jTFYEaP4z3zxUiJ4uplD2lY8DKAAR6LayakqfMEvaXQYoHdZBj1k4-A/exec';

    function limpar(t) { return t ? t.replace(/^"|"$/g, '').trim() : ""; }

    // FAZ A SOMA DIRETO NA SUA PLANILHA DO GOOGLE
    async function alternarCurtida(btn, id) {
        const icone = btn.querySelector('i');
        const txtContador = document.getElementById(`count-${id}`);
        const jaCurtido = localStorage.getItem(`hist_curt_v3_${id}`) === 'sim';
        let acao = "";
        
        let atual = parseInt(txtContador.innerText) || 0;

        if (jaCurtido) {
            btn.classList.remove('curtido');
            icone.className = 'fa-regular fa-heart';
            localStorage.removeItem(`hist_curt_v3_${id}`);
            if(atual > 0) txtContador.innerText = atual - 1;
            acao = "descurtir";
        } else {
            btn.classList.add('curtido');
            icone.className = 'fa-solid fa-heart';
            localStorage.setItem(`hist_curt_v3_${id}`, 'sim');
            txtContador.innerText = atual + 1;
            acao = "curtir";
        }

        // Envia o clique em segundo plano para a planilha salvar
        if(GOOGLE_SCRIPT_URL) {
          fetch(`${GOOGLE_SCRIPT_URL}?id=${id}&action=${acao}`, { mode: 'no-cors' }).catch(() => {});
        }
    }

    // CONTROLE DO POP-UP
    function abrirModal(foto, historia) {
        document.getElementById('modalTexto').innerText = historia;
        document.getElementById('modalImg').src = foto;
        const modal = document.getElementById('modalHistoria');
        modal.style.display = 'flex'; 
        document.body.style.overflow = 'hidden'; 
    }
    function fecharModal() { 
        document.getElementById('modalHistoria').style.display = 'none'; 
        document.body.style.overflow = ''; 
    }
    function fecharModalExterno(e) { if(e.target.id === 'modalHistoria') fecharModal(); }

    async function carregarHistorias() {
      try {
        const res = await fetch(CSV_HISTORIAS_URL + '&t=' + new Date().getTime());
        const data = await res.text();
        
        const linhasValidas = [];
        let linhaAtual = "";
        let dentroDeAspas = false;

        for (let i = 0; i < data.length; i++) {
          const char = data[i];
          if (char === '"') dentroDeAspas = !dentroDeAspas;
          
          if ((char === '\n' || char === '\r') && !dentroDeAspas) {
            if (linhaAtual.trim()) linhasValidas.push(linhaAtual);
            linhaAtual = "";
          } else {
            linhaAtual += char;
          }
        }
        if (linhaAtual.trim()) linhasValidas.push(linhaAtual);

        let listaCards = [];

        for (let i = 1; i < linhasValidas.length; i++) {
          const cols = linhasValidas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
          if (cols.length < 2) continue;

          const foto = limpar(cols[0]);       
          const historia = limpar(cols[1]);   
          // Pega o valor da coluna C (curtidas) se ela já existir na planilha
          const curtidasIniciais = cols[2] ? (parseInt(limpar(cols[2])) || 0) : 0;

          if (foto.includes("http")) {
             listaCards.push({ foto, historia, curtidasIniciais });
          }
        }

        if (listaCards.length === 0) return;

        document.getElementById("track").innerHTML = listaCards.map((item, index) => {
          window[`historia_${index}`] = item.historia;
          
          const jaCurtido = localStorage.getItem(`hist_curt_v3_${index}`) === 'sim';
          const classeCoracao = jaCurtido ? 'fa-solid fa-heart' : 'fa-regular fa-heart';
          const classeBotao = jaCurtido ? 'btn-curtir curtido' : 'btn-curtir';
          
          return `
            <div class="swiper-slide">
              <div class="card">
                <div class="container-curtir">
                    <button class="${classeBotao}" onclick="alternarCurtida(this, ${index})">
                      <i class="${classeCoracao}"></i>
                    </button>
                    <span class="contador-numero" id="count-${index}">${item.curtidasIniciais}</span>
                </div>
                <img src="${item.foto}" onerror="this.src='https://via.placeholder.com/300x450?text=CoffeeArt'">
                <button class="btn-saiba-mais" onclick="abrirModal('${item.foto}', window['historia_${index}'])">🔍 SAIBA MAIS</button>
              </div>
            </div>`;
        }).join('');

        new Swiper('.swiper', { 
            slidesPerView: 'auto', 
            spaceBetween: 25, 
            centeredSlides: true, 
            loop: listaCards.length > 1, 
            grabCursor: true 
        });
      } catch (e) { console.error("Erro ao carregar as histórias:", e); }
    }
    
    carregarHistorias();
  </script>
</body>
</html>
